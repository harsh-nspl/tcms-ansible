- name: Stop existing container gracefully
  community.docker.docker_container:
    name: "{{ container_name }}"
    state: stopped
    stop_timeout: 30
  ignore_errors: yes

- name: Remove old container
  community.docker.docker_container:
    name: "{{ container_name }}"
    state: absent

- name: Set published ports (WAR only)
  set_fact:
    published_ports_final:
      - "{{ app_port }}:8080"
  when: deploy_type == "war"

- name: Deploy container
  community.docker.docker_container:
    name: "{{ container_name }}"
    image: "{{ docker_build.image_name }}:{{ env }}"
    env_file: "{{ env_file_path }}"
    published_ports: "{{ published_ports_final | default(omit) }}"
    etc_hosts:
      host.docker.internal: host-gateway
    state: started
    restart_policy: unless-stopped
    log_driver: json-file
    log_options:
      max-size: "100m"
      max-file: "3"
  register: container_result

- name: Wait for container to be running
  community.docker.docker_container_info:
    name: "{{ container_name }}"
  register: container_info
  until: container_info.container.State.Running
  retries: 6
  delay: 5