- name: Validate AWS region
  fail:
    msg: "AWS_DEFAULT_REGION is not set"
  when: lookup('env','AWS_DEFAULT_REGION') == ""
  run_once: true

- name: Fetch AWS secret
  command: >
    aws secretsmanager get-secret-value
    --secret-id "{{ aws_env_secret_name }}"
    --query SecretString
    --output text
  register: secret_data
  delegate_to: localhost
  run_once: true
  changed_when: false
  become: false
  environment:
    AWS_ACCESS_KEY_ID: "{{ lookup('env','AWS_ACCESS_KEY_ID') }}"
    AWS_SECRET_ACCESS_KEY: "{{ lookup('env','AWS_SECRET_ACCESS_KEY') }}"
    AWS_DEFAULT_REGION: "{{ lookup('env','AWS_DEFAULT_REGION') }}"

- name: Parse secrets JSON
  set_fact:
    secrets_all: "{{ secret_data.stdout | from_json }}"
  run_once: true

- name: Validate environment exists
  fail:
    msg: "Environment '{{ env }}' not found. Available: {{ secrets_all.keys() | list }}"
  when: secrets_all[env] is not defined
  run_once: true

- name: Set secrets for environment
  set_fact:
    secrets: "{{ secrets_all[env] | from_json }}"
  run_once: true