---
# -----------------------------
# Check if replica already initialized
# -----------------------------
- name: Check standby signal
  stat:
    path: "{{ pg_data }}/standby.signal"
  register: standby

- name: Decide if replica needs setup
  set_fact:
    replica_needs_setup: "{{ not standby.stat.exists }}"

# -----------------------------
# Stop replica safely
# -----------------------------
- name: Stop replica
  service:
    name: "postgresql@{{ postgres_version }}-{{ pg_cluster }}"
    state: stopped
  ignore_errors: yes

# -----------------------------
# Clean old data (ONLY if needed)
# -----------------------------
- name: Remove old data directory
  file:
    path: "{{ pg_data }}"
    state: absent
  when: replica_needs_setup

# -----------------------------
# Create clean data directory
# -----------------------------
- name: Create fresh data directory
  file:
    path: "{{ pg_data }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'
  when: replica_needs_setup

# -----------------------------
# Run basebackup from PRIMARY
# -----------------------------
- name: Run basebackup with replication slot
  become: yes
  become_user: postgres
  shell: |
    PGPASSWORD={{ replication_password }} pg_basebackup \
      -h {{ hostvars[groups['database_primary'][0]].private_ip }} \
      -p {{ hostvars[groups['database_primary'][0]].pg_port }} \
      -D {{ pg_data }} \
      -U {{ replication_user }} \
      -Fp -Xs -P \
      -R \
      -S {{ replication_slot_name }}
  args:
    executable: /bin/bash
  when: replica_needs_setup

# -----------------------------
# Ensure correct config
# -----------------------------
- name: Configure postgresql.conf parameters
  lineinfile:
    path: "/etc/postgresql/{{ postgres_version }}/{{ pg_cluster }}/postgresql.conf"
    regexp: "^#?{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: port, value: "{{ pg_port }}" }
    - { key: hot_standby, value: "on" }
    - { key: listen_addresses, value: "'*'" }

# -----------------------------
# Start replica
# -----------------------------
- name: Start replica
  service:
    name: "postgresql@{{ postgres_version }}-{{ pg_cluster }}"
    state: started

# -----------------------------
# Wait for PostgreSQL to be ready
# -----------------------------
- name: Wait for PostgreSQL port
  wait_for:
    port: "{{ pg_port }}"
    delay: 3
    timeout: 30

# -----------------------------
# Verify replication
# -----------------------------
- name: Check WAL receiver status
  become: yes
  become_user: postgres
  shell: |
    psql -p {{ pg_port }} -t -c "SELECT status FROM pg_stat_wal_receiver;"
  register: wal_status
  retries: 5
  delay: 3
  until: wal_status.stdout | trim != ""

- name: Debug WAL status
  debug:
    var: wal_status.stdout