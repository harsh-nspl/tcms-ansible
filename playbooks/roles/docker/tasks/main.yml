# ---------------------------
# Docker install
# (common role handles base packages: ca-certificates, curl, gnupg, jq)
# ---------------------------

- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /etc/apt/keyrings/docker.gpg
    state: present

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ arch_map[ansible_architecture] | default(ansible_architecture) }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
  vars:
    arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    update_cache: yes

- name: Ensure Docker is running
  service:
    name: docker
    state: started
    enabled: yes

# ---------------------------
# Users
# ---------------------------

- name: Add users to docker group
  user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop:
    - "{{ ansible_user }}"
    - jenkins

# ---------------------------
# Get private IP
# ---------------------------

- name: Get private IP
  command: hostname -I
  register: private_ip_raw

- name: Set private IP fact
  set_fact:
    private_ip: "{{ private_ip_raw.stdout.split()[0] }}"

# ---------------------------
# Docker daemon config
# ---------------------------

- name: Configure Docker daemon.json
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "insecure-registries": ["{{ private_ip }}:5000"]
      }
    owner: root
    group: root
    mode: '0644'
  notify: restart docker

# ---------------------------
# Restart Jenkins if present
# ---------------------------

- name: Check if Jenkins is running
  command: systemctl is-active jenkins
  register: jenkins_status
  failed_when: false
  changed_when: false

- name: Restart Jenkins
  service:
    name: jenkins
    state: restarted
  when: jenkins_status.stdout == "active"

# ---------------------------
# Create registry storage
# ---------------------------

- name: Create registry data directory
  file:
    path: /opt/registry/data
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install Docker SDK for Python
  apt:
    name: python3-docker
    state: present

# ---------------------------
# Run Docker registry container
# ---------------------------

- name: Run Docker registry container
  docker_container:
    name: registry
    image: registry:2
    state: started
    restart_policy: always
    ports:
      - "{{ private_ip }}:5000:5000"
    volumes:
      - /opt/registry/data:/var/lib/registry