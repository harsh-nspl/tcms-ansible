---
# ------------------------
# Create or update a Jenkins pipeline without Groovy
# ------------------------
- name: Build pipeline XML
  set_fact:
    pipeline_xml: |
      <flow-definition plugin="workflow-job@2.49">
        <actions/>
        <description>{{ job_item.name }}</description>
        <keepDependencies>false</keepDependencies>
        <properties/>
        <definition class="org.jenkinsci.plugins.workflow.cps.CpsScmFlowDefinition" plugin="workflow-cps@2.1026">
          <scm class="hudson.plugins.git.GitSCM" plugin="git@4.11.3">
            <configVersion>2</configVersion>
            <userRemoteConfigs>
              <hudson.plugins.git.UserRemoteConfig>
                <url>{{ repo_url }}</url>
                <credentialsId>{{ credential_id }}</credentialsId>
              </hudson.plugins.git.UserRemoteConfig>
            </userRemoteConfigs>
            <branches>
              <hudson.plugins.git.BranchSpec>
                <name>'*/master'</name>
              </hudson.plugins.git.BranchSpec>
            </branches>
            <doGenerateSubmoduleConfigurations>false</doGenerateSubmoduleConfigurations>
            <submoduleCfg class="list"/>
            <extensions/>
          </scm>
          <scriptPath>{{ job_item.script }}</scriptPath>
          <lightweight>true</lightweight>
        </definition>
        <triggers/>
        <disabled>false</disabled>
      </flow-definition>

- name: URL encode job name
  set_fact:
    job_name_encoded: "{{ job_item.name | urlencode }}"

- name: Create or update Jenkins pipeline
  uri:
    url: "{{ jenkins_url }}/createItem?name={{ job_name_encoded }}"
    method: POST
    user: "{{ jenkins_admin_user | trim }}"
    password: "{{ jenkins_admin_token | trim }}"
    force_basic_auth: yes
    headers:
      Content-Type: "application/xml"
    body: "{{ pipeline_xml }}"
    status_code: [200, 201, 302]
  delegate_to: localhost