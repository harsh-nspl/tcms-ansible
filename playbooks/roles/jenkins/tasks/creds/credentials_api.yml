- block:

    # =========================
    # 🔐 Get Jenkins crumb
    # =========================
    - name: Get Jenkins crumb
      uri:
        url: "{{ jenkins_url }}/crumbIssuer/api/json"
        method: GET
        user: "{{ jenkins_admin_user }}"
        password: "{{ jenkins_admin_token }}"
        force_basic_auth: yes
        return_content: yes
      register: crumb_response

    - name: Set crumb header
      set_fact:
        crumb_header: >-
          {{
            {
              crumb_response.json.crumbRequestField:
              crumb_response.json.crumb
            }
          }}

    # =========================
    # 📦 Build payload (DICT, not string)
    # =========================
    - name: Build basic payload
      set_fact:
        cred_payload:
          "": "0"
          credentials:
            scope: GLOBAL
            id: "{{ cred_id }}"
            username: "{{ cred_username }}"
            password: "{{ cred_password }}"
            description: "{{ cred_id }}"
            "$class": "com.cloudbees.plugins.credentials.impl.UsernamePasswordCredentialsImpl"
      when: cred_type == "basic"

    - name: Build SSH payload
      set_fact:
        cred_payload:
          "": "0"
          credentials:
            scope: GLOBAL
            id: "{{ cred_id }}"
            username: "{{ cred_username }}"
            description: "{{ cred_id }}"
            "$class": "com.cloudbees.jenkins.plugins.sshcredentials.impl.BasicSSHUserPrivateKey"
            privateKeySource:
              "stapler-class": "com.cloudbees.jenkins.plugins.sshcredentials.impl.BasicSSHUserPrivateKey$DirectEntryPrivateKeySource"
              privateKey: "{{ cred_private_key_content }}"
      when: cred_type == "ssh"

    # =========================
    # 🚀 Create / Update (NO DELETE)
    # =========================
    - name: Create or update credential
      uri:
        url: "{{ jenkins_url }}/credentials/store/system/domain/_/createCredentials"
        method: POST
        user: "{{ jenkins_admin_user }}"
        password: "{{ jenkins_admin_token }}"
        force_basic_auth: yes
        headers: "{{ crumb_header }}"
        body:
          json: "{{ cred_payload | to_json }}"
        body_format: form-urlencoded
        status_code: [200, 201, 204, 302]
      delegate_to: localhost

  when: cred_should_update
  delegate_to: localhost
  no_log: true
  tags: jenkins-credentials