[defaults]

# Inventory (optional since you pass -i, but useful locally)
inventory = ./inventories

# Disable host key checking (important for Jenkins / ephemeral agents)
host_key_checking = False

# Retry failed SSH connections
retry_files_enabled = False

# Cleaner output
stdout_callback = ansible.builtin.default
result_format = yaml

# Timeout for SSH
timeout = 30

# Remote temp directory (fixes /.ansible permission issues)
; remote_tmp = /tmp/ansible-tmp

# Reduce warning noise
deprecation_warnings = False
command_warnings = False

# Parallelism (tune based on infra)
forks = 20

# Gather facts only when needed, using cache for subsequent runs
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/.ansible_facts_cache
fact_caching_timeout = 86400

# Profiling and timing callbacks
callback_whitelist = profile_tasks,timer


[ssh_connection]

# Faster SSH connections
pipelining = True

# Reuse SSH connections with longer ControlPersist
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o StrictHostKeyChecking=no -o PreferredAuthentications=publickey

# Dedicated control socket directory
control_path_dir = /tmp/ansible-ssh-%%h-%%p-%%r

# Optional: speed up further
retries = 3