env: development

ansible_user: ubuntu
ansible_python_interpreter: /usr/bin/python3.12

haproxy_domain: dev.aiojiraapps.com
aws_ssh_key_secret: development-ssh-key-secret
build_dir: /opt/builds
node_version: 22.x
postgres_version: 18
dbname: aio-tcms
dbuser: aiotcms

tcms_env: TCMS_DEV
attachment_store_type: LOCAL
aio_test_batch: TEST_IMPORT_BATCH


# Alloy host-native installation
alloy_version: "0.17.1"
alloy_install_dir: /opt/alloy
alloy_config_file: "{{ alloy_install_dir }}/alloy-config.yml"
alloy_prometheus_port: 9090
alloy_listen_port: 4317

monitor_host: true
monitor_docker: true

docker_scrape_targets:
  - 'localhost:8080'
  - 'localhost:8081'

# Grafana settings
grafana_url: "http://localhost:3000"
grafana_user: "admin"
grafana_password: "admin"

grafana_notifications:
  - name: "Slack Alerts"
    type: "slack"
    uid: "slack_alerts"
    isDefault: true
    settings:
      url: "https://hooks.slack.com/services/TXXXX/BXXXX/XXXXXX"
      recipient: "#alerts"
      sendReminder: true
      frequency: "60s"